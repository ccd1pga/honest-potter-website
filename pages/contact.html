<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contact The Honest Potter about handmade pottery, commissions, gallery pieces, or kiln hire in Liverpool." />
  <link rel="canonical" href="https://www.kelvinkilns.com/pages/contact.html" />
  <meta property="og:title" content="Contact The Honest Potter" />
  <meta property="og:description" content="Send a message about pottery, commissions, gallery pieces, or kiln hire in Liverpool." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.kelvinkilns.com/pages/contact.html" />
  <meta property="og:image" content="https://www.kelvinkilns.com/images/logo_main.png" />
  <title>Contact The Honest Potter | Pottery and Kiln Hire Enquiries</title>
  <link rel="stylesheet" href="../css/theme.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/navigation_new.css">
  <link rel="stylesheet" href="../css/contact.css">
</head>
<body class="page">

  <header>
    <nav class="site-nav" role="navigation" aria-label="Main">
      <div class="nav-inner">
        <a class="nav-brand" href="/index.html">
          <img src="../images/logo.png" alt="Site logo" />
          <span>The Honest Potter</span>
        </a>
        <ul class="nav-links">
          <li><a href="../pages/about.html">About</a></li>
          <li><a href="../pages/shop.html">Shop</a></li>
          <li><a href="../pages/gallery.html">Gallery</a></li>
          <li><a href="../pages/myKiln.html">Kiln Hire</a></li>
          <li><a href="../pages/contact.html" aria-current="page">Contact</a></li>
        </ul>
      </div>
    </nav>
  </header>

  <main>
    <div class="container">
      <section class="section-one">
        <h1 style="margin-top:0;">Contact</h1>
        <p class="muted">Questions about pottery, commissions, or kiln time? Send a message below.</p>

        <!-- Simple success/error messages via query string -->
        <div id="banner-slot"></div>

        <div class="container_contact">
          <form action="/contact.php" method="post">
            <input type="hidden" name="form_name" value="contact_v1">

            <!-- Honeypot (should remain empty) -->
            <div style="position:absolute; left:-5000px;" aria-hidden="true">
              <label>Leave this field empty</label>
              <input type="text" name="website" tabindex="-1" autocomplete="off">
            </div>

            <label for="fname">First Name</label>
            <input type="text" id="fname" name="firstname" placeholder="Your name" maxlength="60" required>

            <label for="lname">Last Name</label>
            <input type="text" id="lname" name="lastname" placeholder="Your last name" maxlength="60" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" maxlength="254" required>

            <label for="phone">Phone number <span class="muted">(optional)</span></label>
            <input type="tel" id="phone" name="phonenumber" placeholder="11 digits, no spaces" inputmode="numeric" pattern="[0-9]{11}" minlength="11" maxlength="11" title="Use exactly 11 digits, with no spaces or letters.">

            <label for="country">Country</label>
            <select class="form-select" autocomplete="country" id="country" name="country" required>
              <option value="">Select your country</option>
              <option value="GB">United Kingdom</option>
              <option value="IE">Ireland</option>
              <option value="US">United States</option>
              <option value="CA">Canada</option>
              <option value="EU">European Union</option>
              <option value="AU">Australia</option>
              <option value="NZ">New Zealand</option>
              <option value="Other">Other</option>
            </select>

            <label for="subject">Subject</label>
            <input id="subject" name="subject" placeholder="What's the topic?" maxlength="100" required />

            <label for="content">Your message</label>
            <textarea id="content" name="content" placeholder="What would you like to tell me?" maxlength="2000" data-max-words="300" style="height:200px" required></textarea>
            <p class="form-help" id="message-count">Up to 300 words.</p>

            <label>
              <input type="checkbox" name="consent" required> I consent to you storing my details to respond to my enquiry.
            </label>

            <div style="margin-top: 10px;">
              <button class="btn-submit" type="submit">Send message</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 The Honest Potter</p>
      <nav class="footer-links" aria-label="Footer">
        <a href="/index.html">Home</a>
        <a href="/pages/gallery.html">Gallery</a>
        <a href="/pages/shop.html">Shop</a>
        <a href="/pages/myKiln.html">Kiln Hire</a>
        <a href="/pages/about.html">About</a>
        <a href="/pages/contact.html">Contact</a>
        <a href="/pages/privacy.html">Privacy statement</a>
        <a href="mailto:info@kelvinkilns.com">info@kelvinkilns.com</a>
      </nav>
    </div>
  </footer>

  <script>
    // Show simple success/error banner based on query params (?sent=1 or ?error=1)
    (function(){
      const p = new URLSearchParams(window.location.search);
      const slot = document.getElementById('banner-slot');
      if (!slot) return;
      if (p.get('sent') === '1'){
        slot.innerHTML = '<div class="form-banner success">Thanks — your message has been sent.</div>';
      } else if (p.get('error')){
        const messages = {
          required: 'Please complete the required fields and tick the consent box.',
          email: 'Please check your email address. It may be mistyped.',
          phone: 'Please enter an 11 digit phone number, using numbers only.',
          message: 'Please shorten your message to 300 words or fewer.',
        };
        slot.innerHTML = '<div class="form-banner error">' + (messages[p.get('error')] || 'Sorry, something went wrong. Please try again.') + '</div>';
      }
    })();
  </script>
  <script>
    (function(){
      const form = document.querySelector('.container_contact form');
      const message = document.getElementById('content');
      const count = document.getElementById('message-count');
      if (!form || !message || !count) return;

      const maxWords = Number(message.dataset.maxWords || 300);

      function wordCount(value){
        const words = value.trim().split(/\s+/).filter(Boolean);
        return words.length;
      }

      function updateCount(){
        const total = wordCount(message.value);
        count.textContent = total + ' / ' + maxWords + ' words';
        count.classList.toggle('is-error', total > maxWords);
        if (total > maxWords) {
          message.setCustomValidity('Please shorten your message to ' + maxWords + ' words or fewer.');
        } else {
          message.setCustomValidity('');
        }
      }

      message.addEventListener('input', updateCount);
      form.addEventListener('submit', updateCount);
      updateCount();
    })();
  </script>
</body>
</html>
